services:
  mysql:
    image: mysql:8.0
    container_name: aigc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: aigc_root_dev_only
      MYSQL_DATABASE: aigc_platform
      MYSQL_USER: aigc_app
      MYSQL_PASSWORD: aigc_app_dev_only
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - /opt/ad-picture-web-codex/mysql-data:/var/lib/mysql

  app:
    build:
      context: /opt/ad-picture-web-codex
      dockerfile: /opt/ad-picture-web-codex/Dockerfile
    container_name: aigc-app
    restart: unless-stopped
    depends_on:
      - mysql
    env_file:
      - /opt/ad-picture-web-codex/.env
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      HOST: 0.0.0.0
      AIGC_CONFIG_PATH: /data/app/config.json
      AIGC_USERS_PATH: /data/users/users.json
      AIGC_PROJECT_ROOT: /data/project-data
      AIGC_DB_HOST: mysql
      AIGC_DB_PORT: 3306
      AIGC_DB_NAME: aigc_platform
      AIGC_DB_USER: aigc_app
      AIGC_DB_PASSWORD: aigc_app_dev_only
      AIGC_SESSION_COOKIE_NAME: ad_session_codex
      AIGC_PROJECT_ROOT_COOKIE_NAME: ad_project_root_codex
      TAI_ENTRY: /usr/local/lib/node_modules/tai-ai/dist/tai.min.js
    volumes:
      - /opt/ad-picture-web-codex/config.json:/data/app/config.json
      - /opt/ad-picture-web/users.json:/data/users/users.json
      - /opt/ad-picture-web-data:/data/project-data
