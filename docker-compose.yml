services:
  mysql:
    image: mysql:8.4.6
    environment:
      MYSQL_ROOT_PASSWORD: ${AIGC_MYSQL_ROOT_PASSWORD:-aigc_root_dev_only}
      MYSQL_DATABASE: ${AIGC_MYSQL_DATABASE:-aigc_platform}
      MYSQL_USER: ${AIGC_MYSQL_USER:-aigc_app}
      MYSQL_PASSWORD: ${AIGC_MYSQL_PASSWORD:-aigc_app_dev_only}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - aigc_mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  aigc-platform:
    build:
      context: .
    image: touka-aigc-platform:local
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${AIGC_HOST_PORT:-5182}:5182"
    environment:
      HOST: 0.0.0.0
      PORT: 5182
      AIGC_DB_HOST: mysql
      AIGC_DB_PORT: 3306
      AIGC_DB_NAME: ${AIGC_MYSQL_DATABASE:-aigc_platform}
      AIGC_DB_USER: ${AIGC_MYSQL_USER:-aigc_app}
      AIGC_DB_PASSWORD: ${AIGC_MYSQL_PASSWORD:-aigc_app_dev_only}
      AIGC_PROJECT_ROOT: /data/project-data/PROJECT_ROOT_P
      AIGC_CONFIG_PATH: /data/state/config.json
      AIGC_USERS_PATH: /data/state/users.json
      VIDEO_AIGC_API_KEY: ${VIDEO_AIGC_API_KEY:-}
      WANGZHUAN_LLM_API_KEY: ${WANGZHUAN_LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_KEY: ${OPENAI_KEY:-}
      REVERSE_PROMPT_API_KEY: ${REVERSE_PROMPT_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PREFIX: ${S3_PREFIX:-uploads}
      S3_ACL: ${S3_ACL:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      API_PREFIX: ${API_PREFIX:-/api}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
    volumes:
      - ../project-data:/data/project-data
      - aigc_state:/data/state
    restart: unless-stopped

volumes:
  aigc_state:
  aigc_mysql_data:
