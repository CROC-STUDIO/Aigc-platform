services:
  mysql:
    image: mysql:8.0
    container_name: aigc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${AIGC_MYSQL_ROOT_PASSWORD:-aigc_root_dev_only}
      MYSQL_DATABASE: ${AIGC_MYSQL_DATABASE:-aigc_platform}
      MYSQL_USER: ${AIGC_MYSQL_USER:-aigc_app}
      MYSQL_PASSWORD: ${AIGC_MYSQL_PASSWORD:-aigc_app_dev_only}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    ports:
      - "127.0.0.1:${AIGC_MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: ad-picture-web-candidate-app:latest
    container_name: aigc-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "${AIGC_HOST_PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      AIGC_DB_HOST: mysql
      AIGC_DB_PORT: 3306
      AIGC_DB_NAME: ${AIGC_MYSQL_DATABASE:-aigc_platform}
      AIGC_DB_USER: ${AIGC_MYSQL_USER:-aigc_app}
      AIGC_DB_PASSWORD: ${AIGC_MYSQL_PASSWORD:-aigc_app_dev_only}
      AIGC_CONFIG_PATH: /data/app/config.json
      AIGC_USERS_PATH: /data/users/users.json
      AIGC_PROJECT_ROOT: /data/project-data
      AIGC_FFMPEG_MAX_CONCURRENCY: ${AIGC_FFMPEG_MAX_CONCURRENCY:-1}
      AIGC_FFMPEG_LOCK_DIR: ${AIGC_FFMPEG_LOCK_DIR:-/data/project-data/.aigc-ffmpeg.lock}
      AIGC_FFMPEG_VIDEO_ENCODER: ${AIGC_FFMPEG_VIDEO_ENCODER:-libx264}
      AIGC_FFMPEG_HWACCEL: ${AIGC_FFMPEG_HWACCEL:-none}
      AIGC_SCHEDULER_TABLE: ${AIGC_SCHEDULER_TABLE:-scheduler_jobs}
      AIGC_SESSION_COOKIE_NAME: ${AIGC_SESSION_COOKIE_NAME:-ad_session_codex}
      AIGC_PROJECT_ROOT_COOKIE_NAME: ${AIGC_PROJECT_ROOT_COOKIE_NAME:-ad_project_root_codex}
      TAI_ENTRY: /usr/local/lib/node_modules/tai-ai/dist/tai.min.js
    volumes:
      - ./config.json:/data/app/config.json
      - ./users.json:/data/users/users.json
      - ../project-data:/data/project-data
