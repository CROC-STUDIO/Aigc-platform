<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Touka AI素材中台 - 竞品素材处理</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css?v=20260715-remix-modules" />
    <link rel="stylesheet" href="/competitor-remix.css?v=20260715-remix-modules" />
  </head>
  <body class="wz-body remix-page">
    <header class="platform-topbar">
      <a class="platform-brand nav-link" href="/" aria-label="Touka AI素材中台">
        <span class="brand-mark">T</span>
        <strong>Touka<span>AI</span></strong>
      </a>
      <nav class="topbar-links" aria-label="顶部导航">
        <a class="topbar-link" href="/wangzhuan-v2.html">网赚素材管线</a>
      </nav>
      <div class="topbar-account">
        <a class="topbar-account-link" href="/wangzhuan-tasks.html">任务管理</a>
        <span id="remixCurrentUserBadge">未登录</span>
        <button id="remixLogoutBtn" class="mini ghost" type="button" hidden>退出</button>
      </div>
    </header>

    <aside class="platform-sidebar">
      <nav class="platform-nav" aria-label="工作台导航">
        <a class="platform-nav-item" href="/"><span>⌂</span><b>广告素材工作台</b></a>
        <a class="platform-nav-item" href="/comic.html"><span>✦</span><b>漫剧工作台</b></a>
        <a class="platform-nav-item" href="/wangzhuan-v2.html"><span>▣</span><b>网赚素材管线</b></a>
        <a class="platform-nav-item active" href="/competitor-remix.html"><span>◇</span><b>竞品素材处理</b></a>
      </nav>
      <div class="sidebar-foot"><span>Touka AI素材中台</span><small>Video Ops</small></div>
    </aside>

    <main class="remix-shell" id="competitorRemixApp" autocomplete="off">
      <aside class="remix-capabilities" id="remixCapabilityNav" aria-label="处理功能">
        <div class="remix-rail-head">
          <span>处理能力</span>
          <strong>竞品素材处理</strong>
        </div>
        <nav id="remixCapabilityList" class="remix-capability-list"></nav>
      </aside>

      <section class="remix-workspace" id="remixWorkspace">
        <header class="remix-workspace-head">
          <div>
            <span id="remixCapabilityEyebrow">去除画面元素</span>
            <h1 id="remixWorkspaceTitle">智能重绘</h1>
          </div>
          <button id="remixResetDraft" class="ghost" type="button">重置当前模式</button>
        </header>

        <section class="remix-source" id="remixDropzone" aria-labelledby="remixSourceTitle">
          <div class="remix-section-head">
            <div><span>01</span><h2 id="remixSourceTitle">输入素材</h2></div>
            <div id="remixSourceStatus" class="remix-status-text" aria-live="polite">等待输入</div>
          </div>
          <div id="remixVideoSourceControls">
            <div class="remix-segments" role="group" aria-label="视频输入方式">
              <button type="button" data-source-mode="url">视频 URL</button>
              <button type="button" data-source-mode="file">上传视频</button>
            </div>
            <div id="remixUrlRow" class="remix-source-row">
              <label for="remixSourceUrl">视频 URL</label>
              <input id="remixSourceUrl" type="url" placeholder="https://example.com/video.mp4" autocomplete="off" />
              <button id="remixApplyUrl" class="ghost" type="button">载入</button>
            </div>
            <div id="remixFileRow" class="remix-file-row" hidden>
              <input id="remixSourceFile" type="file" accept="video/mp4,video/webm,video/quicktime,.m4v" hidden />
              <button id="remixChooseFile" class="ghost" type="button">选择视频</button>
              <span id="remixFileMeta">也可以把视频拖到这里，单个文件不超过 300 MB</span>
            </div>
            <video id="remixSourceVideo" class="remix-source-video" controls preload="metadata" playsinline hidden></video>
          </div>
          <div id="remixReportSource" hidden>
            <label for="remixReportText">报告文本</label>
            <textarea id="remixReportText" rows="8" placeholder="粘贴素材表现数据、投放复盘或分析材料"></textarea>
          </div>
        </section>

        <section class="remix-editor" id="remixEditorSurface" aria-labelledby="remixEditorTitle">
          <div class="remix-section-head">
            <div><span>02</span><h2 id="remixEditorTitle">处理方式与参数</h2></div>
          </div>
          <div id="remixModeTabs" class="remix-mode-tabs" role="tablist" aria-label="处理方式"></div>
          <div id="remixEditorContent"></div>
        </section>
      </section>

      <aside class="remix-runs" id="remixRunRail" aria-label="提交和作业状态">
        <section class="remix-submit-panel">
          <div class="remix-section-head compact"><div><span>03</span><h2>提交任务</h2></div></div>
          <div id="remixReadiness" class="remix-readiness"></div>
          <div id="remixFormError" class="remix-inline-error" role="alert" hidden></div>
          <button id="remixSubmit" class="remix-submit" type="button">提交任务</button>
        </section>
        <section class="remix-run-panel">
          <div class="remix-run-heading">
            <h2>作业</h2>
            <span id="remixRunCount">0</span>
          </div>
          <div id="remixRunList" class="remix-run-list"></div>
          <div id="remixRunDetail" class="remix-run-detail"></div>
        </section>
      </aside>
    </main>

    <div id="remixLoginModal" class="modal-backdrop login-backdrop" hidden>
      <div class="modal-panel login-panel">
        <h2>登录 Touka AI素材中台</h2>
        <p>登录后可提交 video-content-ops 任务。</p>
        <label>账号 <input id="wangzhuanLoginUsername" type="text" autocomplete="username" /></label>
        <label>密码 <input id="wangzhuanLoginPassword" type="password" autocomplete="current-password" /></label>
        <div class="login-status"></div>
        <div class="modal-actions"><button id="wangzhuanLoginBtn" type="button">登录</button></div>
      </div>
    </div>

    <script src="/competitor-remix.js?v=20260715-remix-modules" type="module"></script>
  </body>
</html>
