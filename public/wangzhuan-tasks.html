<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Touka AI素材中台 - 任务管理</title>
    <link rel="stylesheet" href="/styles.css?v=20260626-tasks-row" />
    <link rel="stylesheet" href="/wangzhuan-tasks.css?v=20260626-tasks-row" />
  </head>
  <body class="wz-body">
    <header class="platform-topbar">
      <a class="platform-brand nav-link" href="/" aria-label="Touka AI素材中台">
        <span class="brand-mark">T</span>
        <strong>Touka<span>AI</span></strong>
      </a>
      <nav class="topbar-links" aria-label="顶部导航">
        <a class="topbar-link" href="/wangzhuan.html">网赚素材管线</a>
        <a class="topbar-link" href="/competitor-remix.html">竞品素材改造</a>
      </nav>
      <div class="topbar-account">
        <a class="topbar-account-link active" href="/wangzhuan-tasks.html" aria-current="page">任务管理</a>
        <span id="wzTasksUserBadge">未登录</span>
        <button id="wzTasksLogoutBtn" class="mini ghost" type="button" hidden>退出</button>
      </div>
    </header>

    <aside class="platform-sidebar">
      <nav class="platform-nav" aria-label="工作台导航">
        <a class="platform-nav-item" href="/">
          <span>⌂</span>
          <b>广告素材工作台</b>
        </a>
        <a class="platform-nav-item" href="/comic.html">
          <span>✦</span>
          <b>漫剧工作台</b>
        </a>
        <a class="platform-nav-item" href="/wangzhuan.html">
          <span>▣</span>
          <b>网赚素材管线</b>
        </a>
        <a class="platform-nav-item" href="/competitor-remix.html">
          <span>◇</span>
          <b>竞品素材改造</b>
        </a>
      </nav>
      <div class="sidebar-foot">
        <span>Touka AI素材中台</span>
        <small>网赚平台</small>
      </div>
    </aside>

    <main class="app wz-app wz-tasks-app">
      <section class="operation-pane">
        <div id="wzTasksGlobalError" class="wz-error" hidden role="alert" aria-live="polite"></div>

        <header class="wz-tasks-head">
          <div class="wz-tasks-head-copy">
            <h1>任务管理</h1>
            <p>查看进行中的素材管线批次与竞品改造任务，在此确认预案、停止任务或前往工作台继续编辑。</p>
          </div>
          <div class="wz-tasks-head-tools">
            <div id="wzTasksStats" class="wz-tasks-stats" aria-live="polite" hidden></div>
            <button id="wzTasksRefreshBtn" class="wz-tasks-refresh mini ghost" type="button">
              <span class="wz-tasks-refresh-icon" aria-hidden="true">↻</span>
              刷新
            </button>
          </div>
        </header>

        <div id="wzTasksLayout" class="wz-tasks-layout is-list-only">
          <section class="wz-tasks-list-pane" aria-label="任务列表">
            <div class="wz-tasks-filter-bar">
              <div class="wz-tasks-segment" role="group" aria-label="任务状态">
                <button id="wzTasksScopeActive" class="wz-tasks-segment-btn" type="button" data-scope="active" aria-pressed="false">进行中</button>
                <button id="wzTasksScopeAll" class="wz-tasks-segment-btn active" type="button" data-scope="all" aria-pressed="true">全部</button>
                <button id="wzTasksScopeDone" class="wz-tasks-segment-btn" type="button" data-scope="terminal" aria-pressed="false">已完成</button>
              </div>
              <div class="wz-tasks-segment wz-tasks-segment-type" role="group" aria-label="任务类型">
                <button id="wzTasksTypeAll" class="wz-tasks-segment-btn wz-tasks-type-btn active" type="button" data-run-type="" aria-pressed="true">全部</button>
                <button id="wzTasksTypePipeline" class="wz-tasks-segment-btn wz-tasks-type-btn pipeline" type="button" data-run-type="pipeline" aria-pressed="false">管线</button>
                <button id="wzTasksTypeRemix" class="wz-tasks-segment-btn wz-tasks-type-btn remix" type="button" data-run-type="remix" aria-pressed="false">改造</button>
              </div>
            </div>
            <div id="wzTasksList" class="wz-tasks-list-host" aria-busy="true">加载中…</div>
            <div id="wzTasksPager" class="wz-tasks-pager wz-gallery-pager" hidden></div>
          </section>

          <section id="wzTasksDetailPane" class="wz-tasks-detail-pane" aria-label="任务详情" hidden>
            <div id="wzTasksDetail" hidden></div>
          </section>
        </div>
      </section>
    </main>

    <div id="wzTasksLoginModal" class="modal-backdrop login-backdrop" hidden>
      <div class="modal-panel login-panel">
        <h2>登录 Touka AI素材中台</h2>
        <p>登录后可查看与管理任务。</p>
        <label>账号 <input id="wangzhuanLoginUsername" type="text" autocomplete="username" /></label>
        <label>密码 <input id="wangzhuanLoginPassword" type="password" autocomplete="current-password" /></label>
        <div class="login-status"></div>
        <div class="modal-actions">
          <button id="wangzhuanLoginBtn" type="button">登录</button>
        </div>
      </div>
    </div>

    <script src="/wangzhuan-tasks.js?v=20260626-qc-real" type="module"></script>
  </body>
</html>
